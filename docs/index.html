<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BT MFG — Work in Process $</title>
  <style>
    :root {
      --bg:#0f1216; --panel:#171b22; --panel2:#1d222b; --line:#262d38;
      --text:#e6e9ef; --dim:#9aa3b2; --accent:#3da9fc; --good:#3ddc97;
      --warn:#f0b429; --bad:#ef4444;
    }
    * { box-sizing:border-box; }
    body {
      margin:0; padding:0; font:14px/1.45 -apple-system,BlinkMacSystemFont,system-ui,sans-serif;
      background:var(--bg); color:var(--text);
    }
    .wrap { max-width:1100px; margin:0 auto; padding:24px; }
    header {
      display:flex; justify-content:space-between; align-items:baseline;
      margin-bottom:20px; gap:16px; flex-wrap:wrap;
    }
    h1 { font-size:20px; margin:0; font-weight:600; letter-spacing:.2px; }
    .updated { color:var(--dim); font-size:12px; }
    .hero {
      display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:12px; margin-bottom:22px;
    }
    .stat {
      background:var(--panel); border:1px solid var(--line); border-radius:10px;
      padding:18px 20px;
    }
    .stat .label { color:var(--dim); font-size:12px; text-transform:uppercase; letter-spacing:.06em; }
    .stat .num   { font-size:30px; font-weight:600; margin-top:6px; }
    .stat.overdue .num { color:var(--bad); }
    .stat.missing .num { color:var(--warn); }
    section { margin-bottom:24px; }
    h2 { font-size:13px; text-transform:uppercase; letter-spacing:.08em; color:var(--dim); margin:0 0 10px; font-weight:600; }
    .panel {
      background:var(--panel); border:1px solid var(--line); border-radius:10px;
      overflow:hidden;
    }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:10px 14px; text-align:left; font-size:13px; border-bottom:1px solid var(--line); }
    th { background:var(--panel2); color:var(--dim); font-weight:500; text-transform:uppercase; font-size:11px; letter-spacing:.06em; cursor:pointer; user-select:none; position:relative; }
    th:hover { color:var(--text); }
    th.sorted-asc::after  { content:" ▲"; color:var(--accent); }
    th.sorted-desc::after { content:" ▼"; color:var(--accent); }
    tr:last-child td { border-bottom:0; }
    .num-cell { text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
    .row-link td:first-child a { color:var(--accent); text-decoration:none; }
    .row-link td:first-child a:hover { text-decoration:underline; }
    .pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; }
    .pill.ok      { background:rgba(61,220,151,.12); color:var(--good); }
    .pill.missing { background:rgba(240,180,41,.14); color:var(--warn); }
    .pill.err     { background:rgba(239,68,68,.14);  color:var(--bad);  }
    .overdue { color:var(--bad); }
    footer { color:var(--dim); font-size:11px; margin-top:30px; text-align:center; }
    .loading, .error {
      text-align:center; padding:60px 20px; color:var(--dim);
    }
    .error { color:var(--bad); }
    /* password gate */
    .gate {
      position:fixed; inset:0; background:var(--bg);
      display:flex; align-items:center; justify-content:center;
    }
    .gate form {
      background:var(--panel); border:1px solid var(--line); border-radius:10px;
      padding:28px 30px; min-width:300px;
    }
    .gate h2 { color:var(--text); margin:0 0 14px; text-transform:none; letter-spacing:0; font-size:16px; }
    .gate input {
      width:100%; padding:10px 12px; border-radius:6px; border:1px solid var(--line);
      background:var(--panel2); color:var(--text); font-size:14px; margin-bottom:10px;
    }
    .gate button {
      width:100%; padding:10px 12px; border-radius:6px; border:0;
      background:var(--accent); color:#001a2a; font-size:14px; font-weight:600;
      cursor:pointer;
    }
    .gate .err { color:var(--bad); font-size:12px; min-height:16px; }
  </style>
</head>
<body>
<div class="wrap" id="app">
  <header>
    <h1>Work in process — $ on the board</h1>
    <div class="updated" id="updated">loading…</div>
  </header>

  <div class="hero">
    <div class="stat"><div class="label">Grand total</div><div class="num" id="grand">—</div></div>
    <div class="stat overdue"><div class="label">Overdue $</div><div class="num" id="overdue">—</div></div>
    <div class="stat"><div class="label">Active cards</div><div class="num" id="count">—</div></div>
    <div class="stat missing"><div class="label">Missing PO match</div><div class="num" id="missing">—</div></div>
  </div>

  <section>
    <h2>By list / stage</h2>
    <div class="panel"><table id="t-by-list">
      <thead><tr>
        <th data-key="list_name" data-type="text">List</th>
        <th data-key="card_count" data-type="num" class="num-cell">Cards</th>
        <th data-key="missing"    data-type="num" class="num-cell">Missing</th>
        <th data-key="value"      data-type="num" class="num-cell">Value</th>
      </tr></thead>
      <tbody id="by-list"></tbody>
    </table></div>
  </section>

  <section>
    <h2>By customer</h2>
    <div class="panel"><table id="t-by-customer">
      <thead><tr>
        <th data-key="customer"   data-type="text">Customer</th>
        <th data-key="card_count" data-type="num" class="num-cell">Cards</th>
        <th data-key="missing"    data-type="num" class="num-cell">Missing</th>
        <th data-key="value"      data-type="num" class="num-cell">Value</th>
      </tr></thead>
      <tbody id="by-customer"></tbody>
    </table></div>
  </section>

  <section>
    <h2>Cards</h2>
    <div class="panel"><table id="t-cards">
      <thead><tr>
        <th data-key="name"        data-type="text">Card</th>
        <th data-key="list_name"   data-type="text">List</th>
        <th data-key="customer"    data-type="text">Customer</th>
        <th data-key="po_number"   data-type="num">PO / Line</th>
        <th data-key="part"        data-type="text">Part</th>
        <th data-key="description" data-type="text">Description</th>
        <th data-key="qty"         data-type="num" class="num-cell">Qty</th>
        <th data-key="unit_price"  data-type="num" class="num-cell">Unit $</th>
        <th data-key="value"       data-type="num" class="num-cell">Value</th>
        <th data-key="due"         data-type="date">Due</th>
        <th data-key="status"      data-type="text">Status</th>
      </tr></thead>
      <tbody id="cards"></tbody>
    </table></div>
  </section>

  <footer id="footer"></footer>
</div>

<div class="loading" id="loading">Loading dashboard…</div>
<div class="error" id="error" hidden></div>

<script>
// Public dashboard — no gate. Auto-load on every visit.
async function init() {
  loadData();
}

// --- data load + render --------------------------------------------------
function fmt$(n) {
  if (n === null || n === undefined) return "—";
  return "$" + Number(n).toLocaleString(undefined, {
    minimumFractionDigits: 2, maximumFractionDigits: 2
  });
}
function fmtDate(s) {
  if (!s) return "";
  try { return new Date(s).toLocaleDateString(undefined, {month:"short",day:"numeric"}); }
  catch (_) { return s; }
}
function fmtRelTime(s) {
  if (!s) return "";
  const d = new Date(s);
  const secs = Math.round((Date.now() - d.getTime())/1000);
  if (secs < 60)   return `${secs}s ago`;
  if (secs < 3600) return `${Math.round(secs/60)}m ago`;
  if (secs < 86400) return `${Math.round(secs/3600)}h ago`;
  return `${Math.round(secs/86400)}d ago`;
}
function pill(status) {
  if (status === "ok")
    return '<span class="pill ok">ok</span>';
  if (status === "no_po_found" || status === "line_not_found_in_po" || status === "no_po_number_in_name")
    return `<span class="pill missing">${status.replace(/_/g," ")}</span>`;
  return `<span class="pill err">${status}</span>`;
}

async function loadData() {
  const loading = document.getElementById("loading");
  const errEl = document.getElementById("error");
  try {
    // Cache-bust so we always see the freshest GitHub Pages publish.
    const res = await fetch(`dashboard.json?_=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    render(data);
    loading.hidden = true;
  } catch (e) {
    loading.hidden = true;
    errEl.hidden = false;
    errEl.textContent = "Failed to load dashboard.json: " + e.message;
  }
}

// --- sort state ----------------------------------------------------------
// Per-table active sort. Defaults match what update_dashboard.py emits so
// initial render is stable even without a click.
const SORT = {
  "t-by-list":     { key: null,    dir: "asc",  type: "text" },
  "t-by-customer": { key: "value", dir: "desc", type: "num"  },
  "t-cards":       { key: "value", dir: "desc", type: "num"  },
};

let _data = null;

function sortRows(rows, key, dir, type) {
  if (!key) return rows;
  const mul = dir === "asc" ? 1 : -1;
  const cmp = (a, b) => {
    let av = a[key], bv = b[key];
    // Nulls sort last regardless of direction.
    const aN = av === null || av === undefined || av === "";
    const bN = bv === null || bv === undefined || bv === "";
    if (aN && bN) return 0;
    if (aN) return 1;
    if (bN) return -1;
    if (type === "num") {
      return (Number(av) - Number(bv)) * mul;
    }
    if (type === "date") {
      return (new Date(av).getTime() - new Date(bv).getTime()) * mul;
    }
    return String(av).toLowerCase().localeCompare(String(bv).toLowerCase()) * mul;
  };
  return rows.slice().sort(cmp);
}

function paintSortIndicator(tableId) {
  const t = document.getElementById(tableId);
  if (!t) return;
  const s = SORT[tableId];
  t.querySelectorAll("th").forEach(th => {
    th.classList.remove("sorted-asc", "sorted-desc");
    if (s.key && th.dataset.key === s.key) {
      th.classList.add(s.dir === "asc" ? "sorted-asc" : "sorted-desc");
    }
  });
}

function wireHeaderSort(tableId, rerender) {
  const t = document.getElementById(tableId);
  if (!t) return;
  t.querySelectorAll("th").forEach(th => {
    th.addEventListener("click", () => {
      const key = th.dataset.key;
      if (!key) return;
      const s = SORT[tableId];
      if (s.key === key) {
        s.dir = s.dir === "asc" ? "desc" : "asc";
      } else {
        s.key = key;
        s.type = th.dataset.type || "text";
        // First click on a column: numbers default to desc (largest first),
        // text/date default to asc (a→z, oldest→newest).
        s.dir = s.type === "num" ? "desc" : "asc";
      }
      rerender();
    });
  });
}

// --- per-table renderers -------------------------------------------------
function renderByList() {
  const s = SORT["t-by-list"];
  const rows = sortRows(_data.by_list, s.key, s.dir, s.type);
  document.getElementById("by-list").innerHTML = rows.map(b => `
    <tr>
      <td>${escape(b.list_name)}</td>
      <td class="num-cell">${b.card_count}</td>
      <td class="num-cell">${b.missing ? '<span class="overdue">'+b.missing+'</span>' : '0'}</td>
      <td class="num-cell">${fmt$(b.value)}</td>
    </tr>`).join("");
  paintSortIndicator("t-by-list");
}

function renderByCustomer() {
  const s = SORT["t-by-customer"];
  const rows = sortRows(_data.by_customer, s.key, s.dir, s.type);
  document.getElementById("by-customer").innerHTML = rows.map(b => `
    <tr>
      <td>${escape(b.customer)}</td>
      <td class="num-cell">${b.card_count}</td>
      <td class="num-cell">${b.missing || 0}</td>
      <td class="num-cell">${fmt$(b.value)}</td>
    </tr>`).join("");
  paintSortIndicator("t-by-customer");
}

function renderCards() {
  const s = SORT["t-cards"];
  const rows = sortRows(_data.cards, s.key, s.dir, s.type);
  document.getElementById("cards").innerHTML = rows.map(r => `
    <tr class="row-link${r.overdue ? ' overdue' : ''}">
      <td><a href="${r.url}" target="_blank" rel="noopener">${escape(r.name)}</a></td>
      <td>${escape(r.list_name)}</td>
      <td>${escape(r.customer)}</td>
      <td>${r.po_number ? `${r.po_number}${r.line ? ' / ' + r.line : ''}` : '—'}</td>
      <td>${escape(r.part || '')}</td>
      <td>${escape(r.description || '')}</td>
      <td class="num-cell">${r.qty ?? ''}</td>
      <td class="num-cell">${r.unit_price !== null ? fmt$(r.unit_price) : ''}</td>
      <td class="num-cell${r.overdue ? ' overdue' : ''}">${r.value !== null ? fmt$(r.value) : ''}</td>
      <td>${fmtDate(r.due)}</td>
      <td>${pill(r.status)}</td>
    </tr>`).join("");
  paintSortIndicator("t-cards");
}

function render(d) {
  _data = d;
  document.getElementById("grand").textContent    = fmt$(d.grand_total);
  document.getElementById("overdue").textContent  = fmt$(d.overdue_total);
  document.getElementById("count").textContent    = d.card_count;
  document.getElementById("missing").textContent  = d.missing_count;
  document.getElementById("updated").textContent  =
    "updated " + fmtRelTime(d.generated_at) + " · " + new Date(d.generated_at).toLocaleString();

  renderByList();
  renderByCustomer();
  renderCards();

  // Wire headers once (idempotent because we only register on first render).
  if (!window._sortWired) {
    wireHeaderSort("t-by-list",     renderByList);
    wireHeaderSort("t-by-customer", renderByCustomer);
    wireHeaderSort("t-cards",       renderCards);
    window._sortWired = true;
  }

  document.getElementById("footer").textContent =
    `${d.card_count} active cards · board ${d.board_id}`;
}

function escape(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

// kick off
init();
</script>
</body>
</html>
